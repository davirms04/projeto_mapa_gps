<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none;
        }

        .input-group input {
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .message-box {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        .msg-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .msg-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>

    <!-- Tela de Login -->
    <div id="login-screen" class="glass-card">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h2>
        
        <div id="login-msg" class="message-box"></div>

        <form id="login-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" id="login-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Seu nome de usuário">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="login-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="••••••••">
            </div>

            <button type="submit" class="btn-primary mb-4">Entrar</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Não tem uma conta? 
            <a href="#" onclick="switchScreen('signup')" class="text-indigo-600 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>

    <!-- Tela de Cadastro -->
    <div id="signup-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Cadastro</h2>
        
        <div id="signup-msg" class="message-box"></div>

        <form id="signup-form">
            <div class="input-group mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Novo Usuário</label>
                <input type="text" id="signup-user" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Escolha um usuário">
            </div>

            <div class="input-group mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" id="signup-pass" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md" 
                    placeholder="Mínimo 4 caracteres">
            </div>

            <button type="submit" class="btn-primary mb-4">Criar Conta</button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Já possui conta? 
            <a href="#" onclick="switchScreen('login')" class="text-indigo-600 font-semibold hover:underline">Fazer Login</a>
        </p>
    </div>

    <!-- Tela de Boas-vindas (Pós-login) -->
    <div id="welcome-screen" class="glass-card hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-2 text-center">Bem-vindo!</h2>
        <p class="text-center text-gray-600 mb-6">Você está logado como <span id="display-user" class="font-bold text-indigo-600"></span></p>
        
        <button onclick="logout()" class="w-full border-2 border-gray-300 text-gray-600 font-semibold py-2 rounded-md hover:bg-gray-100 transition-colors">
            Sair do Sistema
        </button>
    </div>

    <script>
    
        function switchScreen(screen) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('signup-screen').classList.add('hidden');
            document.getElementById('welcome-screen').classList.add('hidden');
            
            document.getElementById(`${screen}-screen`).classList.remove('hidden');
            
            // Limpar mensagens ao trocar de tela
            document.getElementById('login-msg').style.display = 'none';
            document.getElementById('signup-msg').style.display = 'none';
        }

        // Exibir mensagem de alerta personalizada
        function 
        (id, text, type) {
            const msgBox = document.getElementById(id);
            msgBox.textContent = text;
            msgBox.style.display = 'block';
            msgBox.className = `message-box ${type === 'error' ? 'msg-error' : 'msg-success'}`;
        }

        // Lógica de Cadastro
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const user = document.getElementById('signup-user').value.trim();
            const pass = document.getElementById('signup-pass').value;

            if (pass.length < 4) {
                showMessage('signup-msg', 'A senha deve ter pelo menos 4 caracteres.', 'error');
                return;
            }

            // Obter usuários existentes do LocalStorage
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Verificar se o usuário já existe
            if (users.some(u => u.username === user)) {
                showMessage('signup-msg', 'Este nome de usuário já está em uso.', 'error');
                return;
            }
              
            // Adicionar novo usuário
            users.push({ username: user, password: pass });
            localStorage.setItem('users', JSON.stringify(users));

            showMessage('signup-msg', 'Cadastro realizado com sucesso! Redirecionando...', 'success');
          
            setTimeout(() => {
                document.getElementById('signup-form').reset();
                switchScreen('login');
                showMessage('login-msg', 'Conta criada! Faça seu login.', 'success');
            }, 1500);
        });

     
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;

            let users = JSON.parse(localStorage.getItem('users')) || [];

            // Buscar usuário
            const foundUser = users.find(u => u.username === user && u.password === pass);

            if (foundUser) {
                document.getElementById('display-user').textContent = user;
                switchScreen('welcome');
            } else {
                showMessage('login-msg', 'Usuário ou senha incorretos.', 'error');
            }
        });

        // Lógica de Logout
        function logout() {
            document.getElementById('login-form').reset();
            switchScreen('login');
        }

        // Verificar se já existe algum dado de sessão ao carregar (Opcional)
        window.onload = () => {
            // Se você quiser manter o usuário logado, precisaria salvar o estado no localStorage também
            console.log("Sistema pronto. Usuários cadastrados:", JSON.parse(localStorage.getItem('users')) || []);
        };
    </script>
</body>
</html>
